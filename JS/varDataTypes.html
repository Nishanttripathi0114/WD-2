<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //JS Data Value Types
        //Primitive- imutable single value data types in js
        //String,Number,Boolean,Undefined,Null,Bright and Symbol

        //string
        var Myname="nikhil rai"
        console.log(Myname);
        //number
        var myMob=35464351354;
        console.log(myMob+"mobile number is"+myMob);
        //boolean
        var isMarried=false;
        console.log(myMob+"is Married ?"+isMarried);
        //undefined
        var myEmail="nikhil98@gmail.com";
        console.log(myEmail);
        //null
        var myAddress=null;
        console.log(myAddress);
        console.log(typeof(myAddress));
        //bright
        var myNum=BigInt(4248245642884864846871);
        console.log(myNum);
        console.log(typeof(myNum));
        //symbol
        var var1=symbol("vikas");
        var var2=symbol("vikas");
        console.log(var1==var2);

    </script>
    
</body>
</html>
