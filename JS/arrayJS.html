<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <script>
        //Array: -used to store multiple values in a single variable
        //Array is a object
        let myArr=[1,2,3,4,5];
        console.log(myArr.lastIndexOf(3));
        console.log(myArr);
        //Array Methods
        //push:-used to add element at the end of the array
        myArr.push(6);
        console.log(myArr);
        //pop:-used to remove element from the end of the array
        myArr.pop();    
        console.log(myArr);

    </script>
</body>
</html>
