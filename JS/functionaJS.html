<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        //function:block of code,used or defined to perform specific task
        //Types of Function
        //normal function: -with para,without para and with default

        function demo(){
            console.log("Hello JS");
        }
        demo();//function calling
        //with parameters
        function demo1(text){
            console.log("Hello "+ text);
        }
        demo1();
        //default PARAMETER
        function add(a,b){
            console.log("Add "+ (a+b));
        }
        add(123);
        //synchronous function
        function cal(){
            function add(a,b){
                console.log("Add "+ (a+b));
            }
        function sub(a,b){
            console.log("Sub "+ (a-b));
        }
        function mul(a,b){
            console.log("Mul "+ (a*b));
        }
        add(10,20);
        sub(15,6);
        mul(10,20);
    }
    cal();
    // annonymous function: -function without name
    let msg=function(){
        console.log("Hello ABES");
        console.log(typeof(msg));
    }
    msg();
    let msg1=()=>console.log("Hello Abesss EC");
    msg1();
    //arrow function using multiple parameters
    let msg2=(a,b)=>{
        var num1=a;
        var num2=b;
        var res=num1/num2;
        console.log("Div "+ res);
    }
    msg2(10,20);
    // IIFE:- 
    (function(){
        console.log("Hello World");
    })();
    //Promise:-used to handle asynchronous operations
    let promise=new Promise(function(resolve,reject){
        let a=10;
        let b=20;
        let c=a+b;
        if(c==30){
            resolve("Success");
        }
        else{
            reject("Failed");
        }
    });
    let myPromise=new Promise(function(resolve,reject){
        let age=10;
     
        if(age>=30){
            resolve("Valid Age ");
        }
        else{
            reject("Your age is not valid");
        }
    });
    myPromise
        .then(msg=>console.log(msg))
        .catch(error=>console.log(error));
    console.log(promise);
    
    //In JavaScript, async and await are modern keywords (introduced in ES2017) that simplify working with Promises,
    //allowing you to write asynchronous code that looks and behaves more like synchronous, sequential code.

    //api.......
    async function userInfo(){
        try{
            let userData=await fetch("https://dummyjson.com/products");
            let response=await userData.json();
            console.log(response);
        }
        catch(error){
            console.log(error);
        }
    }
    userInfo();


//higher order function:-function that takes another function as an argument or returns a function as a result
let num=[1,2,3,4,5];
//map:-used to create a new array by applying a function to each element of the original array
let mapResult=num.map(n=>n*n);
console.log(mapResult);
// reduce:-used to reduce an array to a single value by applying a function to each element of the array
let sum=num.reduce((total,n)=>total+n);
console.log(sum);
//filter:-used to create a new array with all elements that pass the test implemented by the provided function
let sorting=num.filter(n=>n>2);
console.log(sorting);
//forEach:-used to execute a provided function once for each array element
num.forEach(n=>console.log(n*2));

//local storage:-used to store data in the browser
let myInfo={
    name:"Nikhil Rai",
    age:22,
    email:"nikhil7755rai@gmial.com",
    address:{
        city:"Agra",
        state:"UP"
    }
}
localStorage.setItem("myInfo",JSON.stringify(myInfo));
//retrieve and prase the jSON string back to object
let storeData=JSON.parse(localStorage.getItem("myInfo"));
console.log(storeData.name);
        </script>
</body>
</html>
